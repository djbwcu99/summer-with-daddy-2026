<!DOCTYPE html>
<html lang="en">
<head>
  <style>
@media print {
  @page {
    size: landscape;
    margin: 0.4in;
  }

  body {
    background: white !important;
  }

  /* ✅ HIDE EVERYTHING ABOVE CALENDAR (THIS FIXES YOUR MAIN ISSUE) */
  .no-print,
  .add-event,
  form,
  input,
  button {
    display: none !important;
  }

  /* Keep each month on its own page */
  .month-page {
    page-break-after: always;
    break-after: page;
  }

  /* Prevent weird splitting inside calendar */
  .calendar-grid {
    break-inside: avoid;
  }

  /* Make days consistent and smaller so it FITS one page */
  .day {
    min-height: 90px;
    border: 1px solid black;
    padding: 4px;
    font-size: 12px;
    white-space: pre-wrap;
  }

  /* Force full width fit */
  .calendar-grid {
    width: 100%;
  }
}
</style>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Summer With Daddy 2026</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: #f4f6fb;
  color: #222;
}

header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: linear-gradient(90deg, #ffb347, #ff5e62);
  color: white;
  padding: 16px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.9;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 12px;
}

.form-box {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.form-box h3 {
  margin-top: 0;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  font-size: 14px;
}

button {
  background: #ff5e62;
  color: white;
  border: none;
  font-weight: bold;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 30px;
}

.weekday {
  text-align: center;
  font-weight: bold;
  padding: 8px;
}

.day-cell {
  background: white;
  border-radius: 12px;
  min-height: 95px;
  padding: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  font-size: 12px;
}

.day-number {
  font-weight: bold;
  margin-bottom: 6px;
  font-size: 14px;
}

.event-pill {
  background: #fff1b8;
  border-radius: 8px;
  padding: 4px 6px;
  margin-top: 4px;
  font-size: 11px;
}

.month-title {
  margin: 24px 0 12px;
}

@media (max-width: 700px) {
  .calendar-grid {
    gap: 4px;
  }

  .day-cell {
    min-height: 75px;
    font-size: 10px;
    padding: 5px;
  }

  .event-pill {
    font-size: 9px;
  }

  .day-number {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<header>
  <h1>☀️ Summer With Daddy 2026 ☀️</h1>
  <div class="subtitle">Schedule of events</div>
</header>

<div class="container">

  <div class="form-box">
    <h3>Add Event</h3>

    <label>Start Date</label>
    <input id="startDate" type="date" />

    <label>End Date (optional)</label>
    <input id="endDate" type="date" />

    <input id="event" type="text" placeholder="Event name" />

    <input id="emoji" type="text" placeholder="Emoji 🌊" maxlength="2" />

    <button onclick="addEvent()">Add Event</button>
  </div>

  <h2 class="month-title">🌞 June 2026</h2>
  <div id="june" class="calendar-grid"></div>

  <h2 class="month-title">🇺🇸 July 2026</h2>
  <div id="july" class="calendar-grid"></div>

  <h2 class="month-title">🌴 August 2026</h2>
  <div id="august" class="calendar-grid"></div>

</div>

<script>
const API_URL = "https://sheetdb.io/api/v1/wsm9d4yrb5d23";

const weekdays = [
  "Sun",
  "Mon 😎",
  "Tue",
  "Wed 🏖️",
  "Thu",
  "Fri",
  "Sat 🥾"
];

async function loadCalendar() {
  const res = await fetch(API_URL);
  const events = await res.json();

  buildMonth("june", 2026, 5, 30, events);
  buildMonth("july", 2026, 6, 31, events);
  buildMonth("august", 2026, 7, 31, events);
}

function buildMonth(containerId, year, monthIndex, daysInMonth, events) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  weekdays.forEach(day => {
    const header = document.createElement("div");
    header.className = "weekday";
    header.innerText = day;
    container.appendChild(header);
  });

  const firstDay = new Date(year, monthIndex, 1).getDay();

  for (let i = 0; i < firstDay; i++) {
    const blank = document.createElement("div");
    container.appendChild(blank);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const cell = document.createElement("div");
    cell.className = "day-cell";

    const number = document.createElement("div");
    number.className = "day-number";
    number.innerText = day;
    cell.appendChild(number);

    const currentDate = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

    events.forEach(event => {
      const start = event.startDate || event.StartDate || event.Date;
      const end = event.endDate || event.EndDate || start;

      if (currentDate >= start && currentDate <= end) {
        const pill = document.createElement("div");
        pill.className = "event-pill";

const color = event.color || "yellow";

const colors = {

  blue: "#bde0fe",

  green: "#caffbf",

  red: "#ffadad",

  yellow: "#fff1b8",

  purple: "#d0bdf4"

};

pill.style.background = colors[color] || "#fff1b8";

        pill.innerText = `${event.emoji || event.Emoji || ''} ${event.event || event.Event || ''}`;

        cell.appendChild(pill);
      }
    });

    container.appendChild(cell);
  }
}

async function addEvent() {
  const startDate = document.getElementById("startDate").value;
  const endDate = document.getElementById("endDate").value || startDate;
  const event = document.getElementById("event").value;
  const emoji = document.getElementById("emoji").value;

  if (!startDate || !event) {
    alert("Please enter a date and event");
    return;
  }

  const payload = {
    data: [
      {
        startDate,
        endDate,
        event,
        emoji
      }
    ]
  };

  const response = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  if (!response.ok) {
    alert("Failed to add event. Check SheetDB permissions.");
    return;
  }

  document.getElementById("startDate").value = "";
  document.getElementById("endDate").value = "";
  document.getElementById("event").value = "";
  document.getElementById("emoji").value = "";

  loadCalendar();
}

loadCalendar();
</script>

</body>
</html>
